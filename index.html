const calcEG = (fur) => {
  if(!fur) return null;
  const dias=Math.floor((new Date()-new Date(fur))/86400000);
  if(dias<0) return null;
  return {semanas:Math.floor(dias/7),dias:dias%7};
};
const egStr = (fur) => { const e=calcEG(fur); return e?`${e.semanas} sem + ${e.dias} días`:"—"; };
const calcFPP = (fur) => {
  if(!fur) return null;
  const d=new Date(fur); d.setDate(d.getDate()+280);
  return d.toLocaleDateString("es-ES");
};
const calcEGEnFecha = (fur, fechaConsulta) => {
  if(!fur||!fechaConsulta) return null;
  const dias=Math.floor((new Date(fechaConsulta)-new Date(fur))/86400000);
  if(dias<0) return null;
  return `${Math.floor(dias/7)} sem + ${dias%7} días`;
};
const hoy = () => new Date().toISOString().split("T")[0];
const genId = (lista) => String((lista.reduce((m,p)=>Math.max(m,parseInt(p.id)||0),0))+1).padStart(6,"0");

const emptyPac = () => ({

function flash(m,color="#15803d"){const t=document.getElementById("toast");t.textContent=m;t.style.background=color;t.style.display="block";setTimeout(()=>t.style.display="none",2500);}

async function loadPacs(){
  document.getElementById("app").innerHTML=`<div class="loading">⏳ Cargando pacientes...</div>`;
  const {data,error}=await db.from("pacientes").select("*").order("id_hc");
  if(error){flash("❌ Error: "+error.message,"#b91c1c");state.pacs=[];}
  else state.pacs=data.map(r=>({...r.datos,_dbid:r.id}));
  render();
}

async function savePac(pac){
  const payload={id_hc:pac.id,datos:pac};
  if(pac._dbid){
    const {error}=await db.from("pacientes").update(payload).eq("id",pac._dbid);
    if(error){flash("❌ Error: "+error.message,"#b91c1c");return false;}
  } else {
    const {data,error}=await db.from("pacientes").insert(payload).select();
    if(error){flash("❌ Error: "+error.message,"#b91c1c");return false;}
    if(data?.[0]) pac._dbid=data[0].id;
  }
  flash("✅ Guardado en Supabase");
  return true;
}

async function deletePac(pac){
  if(!pac._dbid) return;
  await db.from("pacientes").delete().eq("id",pac._dbid);
}

const pdfCSS=`*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;color:#0a1628;margin:0;padding:0}.hdr-pdf{background:#0d3b7a;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.hdr-pdf-left h1{font-size:20px;font-weight:900;margin-bottom:3px}.hdr-pdf-left p{font-size:11px;opacity:.85;margin:1px 0}.hdr-pdf-right{text-align:right;font-size:11px;opacity:.85;line-height:1.6}.titulo-informe{text-align:center;padding:24px 24px 16px;border-bottom:3px solid #0d3b7a;margin-bottom:20px}.titulo-informe h2{font-size:28px;font-weight:900;color:#0d3b7a;letter-spacing:2px;text-transform:uppercase}.titulo-informe .fecha{font-size:14px;color:#475569;margin-top:6px;font-weight:600}.pac-box{background:#0d3b7a;color:#fff;border-radius:10px;padding:16px 20px;margin:0 24px 20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}.pac-box-left h3{font-size:20px;font-weight:900;margin-bottom:6px}.pac-box-left p{font-size:12px;opacity:.9;margin:2px 0}.pac-box-right{text-align:right}.pac-box-right p{font-size:12px;opacity:.9;margin:2px 0}.pac-box-right .hc{font-size:18px;font-weight:900;margin-bottom:4px}.eg-row{display:flex;gap:10px;flex-wrap:wrap;margin:0 24px 20px}.eg{background:#bfdbfe;border:2px solid #0d3b7a;border-radius:8px;padding:8px 16px;font-weight:900;font-size:14px;color:#0d3b7a;display:inline-block}.content{padding:0 24px}h2.sec{color:#0d3b7a;font-size:14px;border-bottom:2px solid #0d3b7a;padding-bottom:4px;margin-top:18px;margin-bottom:8px}table{width:100%;border-collapse:collapse;margin-top:8px}th{background:#0d3b7a;color:#fff;padding:6px 8px;text-align:left;font-size:11px}td{padding:5px 8px;border-bottom:1px solid #dbeafe;font-size:11px}tr:nth-child(even) td{background:#f0f5fb}.obs{border-left:4px solid #0d3b7a;padding:6px 10px;margin-bottom:8px;background:#e8f0fb;border-radius:0 5px 5px 0}.gin{border-left:4px solid #0f766e;padding:6px 10px;margin-bottom:8px;background:#d1fae5;border-radius:0 5px 5px 0}.firma{margin:40px 24px 24px;border-top:2px solid #0d3b7a;padding-top:16px;display:flex;justify-content:flex-end}.firma-box{text-align:center;min-width:260px}.firma-linea{border-top:1px solid #0a1628;margin:32px 0 8px;width:100%}.firma-nombre{font-size:14px;font-weight:900;color:#0d3b7a}.firma-cargo{font-size:11px;color:#475569;margin:2px 0}.firma-col{font-size:11px;color:#475569}.firma-fecha{font-size:11px;color:#475569;margin-top:4px}`;

function buildPDF(pac,tipo,embarazoId){
  const egTxt=pac.fur?egStr(pac.fur):"—";
  const fpp=pac.fur?calcFPP(pac.fur):"—";
  const fechaHoy=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"});
  const tipoLabel=tipo==="completa"?"Historia Clínica Completa":tipo==="obs"?"Informe Obstétrico":tipo==="gin"?"Informe Ginecológico":"Resumen Controles Prenatales";

  let body=`
    <div class="hdr-pdf">
      <div class="hdr-pdf-left"><h1>Historia Clínica</h1><p>Ginecología y Obstetricia</p></div>
      <div class="hdr-pdf-right"><strong>Dr. González Mesa</strong><br>Catedrático de Obstetricia y Ginecología<br>Colegiado en Málaga · Nº 2906192</div>
    </div>
    <div class="titulo-informe"><h2>${tipoLabel}</h2><div class="fecha">Fecha del informe: ${fechaHoy}</div></div>
    <div class="pac-box">
      <div class="pac-box-left">
        <h3>${pac.nombre}</h3>
        <p>📅 Fecha de Nacimiento: ${pac.fechaNac||"—"}</p>
        <p>🏥 Aseguradora: ${pac.aseguradora||"—"}</p>
      </div>
      <div class="pac-box-right">
        <div class="hc">HC: ${pac.id}</div>
        <p>🩸 Grupo: ${pac.grupoABO||"—"} ${pac.rh||""}</p>
        <p>Fórmula: G${pac.g||0}P${pac.p||0}A${pac.a||0}C${pac.c||0}V${pac.v||0}</p>
      </div>
    </div>
    <div class="content">`;

  if(pac.fur){body+=`<div class="eg-row"><span class="eg">FUR: ${pac.fur}</span><span class="eg">EG: ${egTxt}</span><span class="eg">FPP: ${fpp}</span></div>`;}

  // Antecedentes aparecen en obs, gin y completa
  if(tipo==="completa"||tipo==="obs"||tipo==="gin"){
    body+=`<h2 class="sec">📋 Antecedentes</h2>
      <p><b>Grupo/Rh:</b> ${pac.grupoABO||"—"} ${pac.rh||""}</p>
      <p><b>Patológicos:</b> ${pac.antPatologicos||"—"}</p>
      <p><b>Quirúrgicos:</b> ${pac.antQuirurgicos||"—"}</p>
      <p><b>Familiares:</b> ${pac.antFamiliares||"—"}</p>
      <p><b>Planificación:</b> ${pac.planificacion||"—"}</p>`;
  }

  if(tipo!=="gin"){
    body+=`<h2 class="sec">🤰 Datos Obstétricos</h2><p>Fórmula: <b>G${pac.g||0}P${pac.p||0}A${pac.a||0}C${pac.c||0}V${pac.v||0}</b></p>`;
  }

  if(tipo==="completa"||tipo==="obs"||tipo==="prenatal"){
    const cs=embarazoId?(pac.consultasObs||[]).filter(c=>c.embarazoId===embarazoId):(pac.consultasObs||[]);
    body+=`<h2 class="sec">🩺 Consultas Obstétricas${embarazoId?" — Embarazo "+embarazoId:""}</h2>`;
    if(!cs.length){body+=`<p>Sin consultas.</p>`;}
    else{
      body+=`<table><tr><th>Fecha</th><th>EG</th><th>Motivo</th><th>Peso</th><th>TA</th><th>FC</th><th>AU</th><th>Presentación</th></tr>`;
      cs.forEach(c=>{body+=`<tr><td>${c.fecha||"—"}</td><td>${c.eg||"—"}</td><td>${c.motivo||"—"}</td><td>${c.peso||"—"} kg</td><td>${c.ta||"—"}</td><td>${c.fc||"—"}</td><td>${c.au||"—"} cm</td><td>${c.presentacion||"—"}</td></tr>`;});
      body+=`</table>`;
      cs.filter(c=>c.exploracion||c.diagnostico||c.plan).forEach(c=>{
        body+=`<div class="obs"><b>${c.fecha}</b> — ${c.motivo||""}<br>${c.exploracion?`<b>Evolución:</b> ${c.exploracion}<br>`:""}${c.diagnostico?`<b>Dx:</b> ${c.diagnostico}<br>`:""}${c.plan?`<b>Plan:</b> ${c.plan}`:""}</div>`;
      });
    }
    const es=embarazoId?(pac.ecografias||[]).filter(e=>e.embarazoId===embarazoId):(pac.ecografias||[]);
    body+=`<h2 class="sec">🔬 Ecografías</h2>`;
    if(!es.length){body+=`<p>Sin ecografías.</p>`;}
    else{
      body+=`<table><tr><th>Fecha</th><th>EG</th><th>CRL</th><th>TN</th><th>DBP</th><th>LF</th><th>CA</th><th>CC</th><th>Placenta</th><th>LA</th><th>Sexo</th></tr>`;
      es.forEach(e=>{
        body+=`<tr><td>${e.fecha||"—"}</td><td>${e.eg||"—"}</td><td>${e.crl||"—"}</td><td>${e.tn||"—"}</td><td>${e.dbp||"—"}</td><td>${e.lf||"—"}</td><td>${e.ca||"—"}</td><td>${e.cc||"—"}</td><td>${e.placenta||"—"}</td><td>${e.la||"—"}</td><td>${e.sexo||"—"}</td></tr>`;
        if(e.obs) body+=`<tr><td colspan="11" style="font-style:italic;color:#475569">Obs: ${e.obs}</td></tr>`;
      });
      body+=`</table>`;
    }
  }

  if(tipo==="completa"||tipo==="gin"){
    body+=`<h2 class="sec">🌿 Consultas Ginecológicas</h2>`;
    (pac.consultasGin||[]).forEach(c=>{
      body+=`<div class="gin"><b>${c.fecha}</b> — ${c.motivo||""}${c.exploracion?`<br><b>Exploración:</b> ${c.exploracion}`:""}${c.expComplementarias?`<br><b>Exp. Compl.:</b> ${c.expComplementarias}`:""}${c.diagnostico?`<br><b>Dx:</b> ${c.diagnostico}`:""}${c.plan?`<br><b>Plan:</b> ${c.plan}`:""}</div>`;
    });
  }

  if(tipo==="completa"){
    body+=`<h2 class="sec">🧪 Análisis</h2>`;
    if(!(pac.analisis||[]).length){body+=`<p>Sin análisis.</p>`;}
    else{
      body+=`<table><tr><th>Fecha</th><th>Tipo</th><th>Resultado</th></tr>`;
      pac.analisis.forEach(a=>{body+=`<tr><td>${a.fecha||"—"}</td><td>${a.tipo}</td><td>${a.resultado||"—"}</td></tr>`;});
      body+=`</table>`;
    }
  }

  body+=`</div>
    <div class="firma">
      <div class="firma-box">
        <div class="firma-linea"></div>
        <div class="firma-nombre">Dr. González Mesa</div>
        <div class="firma-cargo">Catedrático de Obstetricia y Ginecología</div>
        <div class="firma-col">Colegiado en Málaga · Nº 2906192</div>
        <div class="firma-fecha">Málaga, ${fechaHoy}</div>
      </div>
    </div>`;

  return `<!DOCTYPE html><html><head><meta charset="utf-8"><style>${pdfCSS}</style></head><body>${body}</body></html>`;
}

function filtrarPacs(){
  const f=state.filtros;
  return state.pacs.filter(p=>{
    if(f.aseguradora&&!(p.aseguradora||"").toLowerCase().includes(f.aseguradora.toLowerCase())) return false;
    if(f.grupoABO&&p.grupoABO!==f.grupoABO) return false;
    if(f.rh&&p.rh!==f.rh) return false;
    if(f.embarazada==="si"&&!p.fur) return false;
    if(f.embarazada==="no"&&p.fur) return false;
    if(state.bus&&!p.nombre.toLowerCase().includes(state.bus.toLowerCase())&&!p.id.includes(state.bus)&&!(p.aseguradora||"").toLowerCase().includes(state.bus.toLowerCase())) return false;
    return true;
  });
}

function renderCharts(){
  Object.values(state.charts).forEach(c=>{try{c.destroy();}catch(e){}});state.charts={};

function renderForm(){
  const p=state.pac;
  const eg=p.fur?egStr(p.fur):null;const fpp=p.fur?calcFPP(p.fur):null;

    </div>`;
  }

  if(t===2){const n=state.nAnal;tabContent=`<div class="card"><div class="sec-tit sec-blue">🧪 Análisis</div><div class="form-sec-blue"><div class="g3"><div><label class="lbl">Fecha</label><input id="na-fecha" type="date" value="${n.fecha}"></div><div><label class="lbl">Tipo</label><input id="na-tipo" placeholder="Hemograma, VIH..." value="${n.tipo}"></div><div><label class="lbl">Resultado</label><input id="na-resultado" value="${n.resultado}"></div></div><button class="btn btn-primary" id="btn-add-anal" style="margin-top:10px">+ Agregar</button></div>${(p.analisis||[]).map(a=>`<div style="display:flex;justify-content:space-between;border-left:3px solid #0ea5e9;padding-left:10px;margin-bottom:7px;align-items:center"><span style="font-size:14px"><b>${a.tipo}</b> — ${a.resultado} <span style="color:#475569;font-size:13px">${a.fecha}</span></span><button class="btn btn-danger btn-sm" data-del-anal="${a.id}">✕</button></div>`).join("")}</div>`;}

  if(t===3){const n=state.nObs;const egAuto=p.fur?calcEGEnFecha(p.fur,n.fecha||hoy()):"";
    tabContent=`<div class="card">${eg?`<div class="eg-banner"><span class="eg-box">📅 FUR: ${new Date(p.fur).toLocaleDateString("es-ES")}</span><span class="eg-box" style="background:#93c5fd">🤰 EG hoy: ${eg}</span><span class="eg-box eg-green">🏁 FPP: ${fpp}</span></div>`:""}
    <div class="sec-tit sec-blue">🩺 Nueva Consulta Obstétrica</div><div class="form-sec-blue"><div class="g3">

      <div><label class="lbl">EG en Consulta</label><input id="no-eg" value="${egAuto}" readonly style="background:#bfdbfe;font-weight:800;color:#0d3b7a"></div>
      <div><label class="lbl">Motivo</label><input id="no-motivo" value="${n.motivo}"></div>
      <div><label class="lbl">Peso (kg)</label><input id="no-peso" type="number" value="${n.peso}"></div>
      <div><label class="lbl">TA (mmHg)</label><input id="no-ta" placeholder="120/80" value="${n.ta}"></div>
      <div><label class="lbl">FC (lpm)</label><input id="no-fc" type="number" value="${n.fc}"></div>
      <div><label class="lbl">Altura Uterina (cm)</label><input id="no-au" type="number" value="${n.au}"></div>
      <div><label class="lbl">Presentación</label><select id="no-presentacion"><option value="">—</option>${["Cefálica","Podálica","Transversa","Oblicua"].map(o=>`<option${n.presentacion===o?" selected":""}>${o}</option>`).join("")}</select></div>
    </div>
    <div class="g2" style="margin-top:10px">      <div><label class="lbl">Evolución</label><textarea id="no-exploracion">${n.exploracion}</textarea></div><div><label class="lbl">Diagnóstico</label><textarea id="no-diagnostico">${n.diagnostico}</textarea></div><div class="span2"><label class="lbl">Plan / Tratamiento</label><textarea id="no-plan">${n.plan}</textarea></div></div>

    ${(p.consultasObs||[]).map(c=>`<div class="obs-card" style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div class="row"><b style="font-size:14px">${c.fecha}</b>${c.embarazoId?`<span class="badge">${c.embarazoId}</span>`:""}${c.eg?`<span class="badge">EG: ${c.eg}</span>`:""}</div><div style="font-size:13px;color:#1e3a5f">Motivo: ${c.motivo||"—"}</div>${(c.peso||c.ta||c.fc)?`<div style="font-size:13px">Peso: ${c.peso||"—"} · TA: ${c.ta||"—"} · FC: ${c.fc||"—"}</div>`:""}${c.diagnostico?`<div style="font-size:13px"><b>Dx:</b> ${c.diagnostico}</div>`:""}</div><button class="btn btn-danger btn-sm" data-del-obs="${c.id}">✕</button></div>`).join("")}
    </div>`;}

  if(t===4){const n=state.nEco;tabContent=`<div class="card"><div class="sec-tit sec-blue">🔬 Ecografías</div><div class="form-sec-blue"><div class="g3">
    <div><label class="lbl">Fecha</label><input id="ne-fecha" type="date" value="${n.fecha}"></div>
    <div><label class="lbl">ID Embarazo</label><input id="ne-embarazoId" placeholder="ej: EMB-2024" value="${n.embarazoId}"></div>
    <div><label class="lbl">EG (sem)</label><input id="ne-eg" placeholder="ej: 20" value="${n.eg}"></div>
    <div><label class="lbl">CRL (mm) 1er trim.</label><input id="ne-crl" type="number" placeholder="Long. céfalo-caudal" value="${n.crl||""}"></div>
    <div><label class="lbl">TN (mm)</label><input id="ne-tn" type="number" placeholder="Translucencia nucal" value="${n.tn||""}"></div>
    <div><label class="lbl">DBP (mm)</label><input id="ne-dbp" type="number" value="${n.dbp}"></div>
    <div><label class="lbl">LF (mm)</label><input id="ne-lf" type="number" value="${n.lf}"></div>
    <div><label class="lbl">CA (mm)</label><input id="ne-ca" type="number" value="${n.ca}"></div>
    <div><label class="lbl">CC (mm)</label><input id="ne-cc" type="number" value="${n.cc}"></div>
    <div><label class="lbl">Placenta</label><input id="ne-placenta" value="${n.placenta}"></div>
    <div><label class="lbl">Líquido Amniótico</label><select id="ne-la"><option value="">—</option>${["Normal","Aumentado (polihidramnios)","Disminuido (oligohidramnios)"].map(o=>`<option${n.la===o?" selected":""}>${o}</option>`).join("")}</select></div>
    <div><label class="lbl">Sexo Fetal</label><select id="ne-sexo"><option value="">—</option>${["Masculino","Femenino","No determinado"].map(o=>`<option${n.sexo===o?" selected":""}>${o}</option>`).join("")}</select></div>
    </div><div style="margin-top:10px"><label class="lbl">Observaciones</label><textarea id="ne-obs">${n.obs}</textarea></div>
    <button class="btn btn-primary" id="btn-add-eco" style="margin-top:10px">+ Agregar Ecografía</button></div>
    ${(p.ecografias||[]).map(e=>`<div class="obs-card" style="display:flex;justify-content:space-between;align-items:flex-start"><div>${(e.crl||e.tn)?`<div style="font-size:13px">CRL: ${e.crl||"—"} · TN: ${e.tn||"—"} mm</div>`:""}<div style="font-size:13px">DBP: ${e.dbp||"—"} · LF: ${e.lf||"—"} · CA: ${e.ca||"—"} · CC: ${e.cc||"—"} mm</div>${e.obs?`<div style="font-size:12px;font-style:italic">${e.obs}</div>`:""}</div><button class="btn btn-danger btn-sm" data-del-eco="${e.id}">✕</button></div>`).join("")}
    </div>`;}

  if(t===5){const n=state.nGin;tabContent=`<div class="card"><div class="sec-tit sec-teal">🌿 Nueva Consulta Ginecológica</div><div class="form-sec-teal">
    <div class="g2"><div><label class="lbl">Fecha</label><input id="ng-fecha" type="date" value="${n.fecha}"></div><div><label class="lbl">Motivo</label><input id="ng-motivo" value="${n.motivo}"></div></div>
    ${[["Exploración Física","exploracion"],["Exploraciones Complementarias","expComplementarias"],["Diagnóstico","diagnostico"],["Plan / Tratamiento","plan"]].map(([l,k])=>`<div style="margin-top:10px"><label class="lbl">${l}</label><textarea id="ng-${k}">${n[k]}</textarea></div>`).join("")}
    <button class="btn btn-teal" id="btn-add-gin" style="margin-top:10px">+ Agregar Consulta</button></div>
    ${(p.consultasGin||[]).map(c=>`<div class="gin-card" style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><b style="font-size:14px">${c.fecha}</b> — ${c.motivo||"—"}${c.expComplementarias?`<div style="font-size:13px"><b>Exp. Compl.:</b> ${c.expComplementarias}</div>`:""}${c.diagnostico?`<div style="font-size:13px"><b>Dx:</b> ${c.diagnostico}</div>`:""}</div><button class="btn btn-danger btn-sm" data-del-gin="${c.id}">✕</button></div>`).join("")}
    </div>`;}

  return `${renderHeader(`HC: ${p.id}`,`<button class="btn btn-green" id="btn-guardar">💾 Guardar</button><button class="btn btn-gray" id="btn-cancelar" style="margin-left:4px">Cancelar</button>`)}
  <div class="wrap">${egBanner}<div class="tab-bar">${tabBar}</div>${tabContent}</div>`;
}

function bindLoginEvents(){
  const btn=document.getElementById("btn-login");if(!btn) return;
  const doLogin=()=>{
    const u=document.getElementById("login-user")?.value.trim();
    const p=document.getElementById("login-pass")?.value.trim();
    if(USERS.find(x=>x.user===u&&x.pass===p)){sessionStorage.setItem("hc_auth","1");state.loggedIn=true;loadPacs();}
    else{document.getElementById("app").innerHTML=renderLogin(true);bindLoginEvents();}
  };
  btn.onclick=doLogin;
  document.getElementById("login-pass").onkeydown=e=>{if(e.key==="Enter") doLogin();};
}

function bindEvents(){
  const btnLogout=document.getElementById("btn-logout");if(btnLogout) btnLogout.onclick=()=>{sessionStorage.removeItem("hc_auth");state.loggedIn=false;render();};
  document.querySelectorAll(".nav-btn").forEach(el=>{el.onclick=()=>{state.seccion=el.dataset.sec;render();};});
  const btnNueva=document.getElementById("btn-nueva");if(btnNueva) btnNueva.onclick=()=>{const p=emptyPac();p.id=genId(state.pacs);state.pac=p;state.tab=0;state.vista="form";render();};
  const inpBus=document.getElementById("inp-bus");if(inpBus) inpBus.oninput=e=>{state.bus=e.target.value;render();};
  const filAs=document.getElementById("fil-aseguradora");if(filAs) filAs.oninput=e=>{state.filtros.aseguradora=e.target.value;render();};
  const filG=document.getElementById("fil-grupoABO");if(filG) filG.onchange=e=>{state.filtros.grupoABO=e.target.value;render();};
  const filR=document.getElementById("fil-rh");if(filR) filR.onchange=e=>{state.filtros.rh=e.target.value;render();};
  const filE=document.getElementById("fil-embarazada");if(filE) filE.onchange=e=>{state.filtros.embarazada=e.target.value;render();};
  const btnLimpiar=document.getElementById("btn-limpiar-filtros");if(btnLimpiar) btnLimpiar.onclick=()=>{state.filtros={aseguradora:"",grupoABO:"",rh:"",embarazada:""};state.bus="";render();};
  const btnExcel=document.getElementById("btn-excel");if(btnExcel) btnExcel.onclick=exportExcel;
  const btnPrint=document.getElementById("btn-print-list");if(btnPrint) btnPrint.onclick=()=>printListado(filtrarPacs());
  const btnPrint2=document.getElementById("btn-print-list2");if(btnPrint2) btnPrint2.onclick=()=>printListado(filtrarPacs());
  document.querySelectorAll(".pac-row,.pac-row-tbl").forEach(el=>{el.onclick=()=>{state.pac={...state.pacs.find(p=>p.id===el.dataset.id)};state.tab=0;state.vista="detalle";render();};});
  const btnEditar=document.getElementById("btn-editar");if(btnEditar) btnEditar.onclick=()=>{state.vista="form";render();};
  const btnEliminar=document.getElementById("btn-eliminar");if(btnEliminar) btnEliminar.onclick=async()=>{if(!confirm("¿Eliminar paciente?")) return;await deletePac(state.pac);state.pacs=state.pacs.filter(p=>p.id!==state.pac.id);flash("✅ Eliminado");state.vista="lista";render();};
  const btnVolver=document.getElementById("btn-volver");if(btnVolver) btnVolver.onclick=()=>{state.vista="lista";render();};
  const btnPdfToggle=document.getElementById("btn-pdf-toggle");if(btnPdfToggle) btnPdfToggle.onclick=(e)=>{e.stopPropagation();state.pdfMenu=!state.pdfMenu;render();};
  document.querySelectorAll(".pdf-menu-item").forEach(el=>{el.onclick=()=>{openPDF(state.pac,el.dataset.pdf,el.dataset.emb);state.pdfMenu=false;render();};});
  document.addEventListener("click",()=>{if(state.pdfMenu){state.pdfMenu=false;render();}},{once:true});
  document.querySelectorAll(".tab-btn").forEach(el=>{el.onclick=()=>{collectFormData();state.tab=parseInt(el.dataset.tab);render();};});
  const btnGuardar=document.getElementById("btn-guardar");
  if(btnGuardar) btnGuardar.onclick=async()=>{
    collectFormData();
    if(!state.pac.nombre.trim()){flash("⚠️ Apellidos y Nombre obligatorio","#b91c1c");return;}
    const ok=await savePac(state.pac);if(!ok) return;
    const existe=state.pacs.find(p=>p.id===state.pac.id);
    state.pacs=existe?state.pacs.map(p=>p.id===state.pac.id?state.pac:p):[...state.pacs,state.pac];
    state.vista="detalle";render();
  };
  const btnCancelar=document.getElementById("btn-cancelar");if(btnCancelar) btnCancelar.onclick=()=>{state.vista=state.pacs.find(p=>p.id===state.pac.id)?"detalle":"lista";render();};
  const furInp=document.getElementById("f-fur");if(furInp) furInp.oninput=e=>{collectFormData();state.pac.fur=e.target.value;render();};
  const gInp=document.getElementById("f-g");if(gInp) gInp.oninput=e=>{collectFormData();state.pac.g=e.target.value;render();};
  document.querySelectorAll(".emb-fecha,.emb-evolucion,.emb-finalizacion,.emb-rnSexo,.emb-rnPeso,.emb-estadoActual").forEach(el=>{el.oninput=()=>collectEmbarazos();el.onchange=()=>collectEmbarazos();});
  const btnAddAnal=document.getElementById("btn-add-anal");if(btnAddAnal) btnAddAnal.onclick=()=>{
    const fecha=document.getElementById("na-fecha")?.value||hoy();
    const tipo=document.getElementById("na-tipo")?.value||"";
    const resultado=document.getElementById("na-resultado")?.value||"";
    if(!tipo.trim()) return;
    state.pac.analisis=[...(state.pac.analisis||[]),{fecha,tipo,resultado,id:Date.now()}];
    state.nAnal={fecha:hoy(),tipo:"",resultado:""};
    render();
  };
  const btnAddObs=document.getElementById("btn-add-obs");if(btnAddObs) btnAddObs.onclick=()=>{collectObsForm();if(!state.nObs.motivo.trim()) return;state.nObs.eg=state.pac.fur?calcEGEnFecha(state.pac.fur,state.nObs.fecha||hoy()):state.nObs.eg;state.pac.consultasObs=[...(state.pac.consultasObs||[]),{...state.nObs,id:Date.now()}];state.nObs={fecha:hoy(),embarazoId:"",eg:"",motivo:"",peso:"",ta:"",fc:"",au:"",presentacion:"",exploracion:"",diagnostico:"",plan:""};render();};
  const btnAddEco=document.getElementById("btn-add-eco");if(btnAddEco) btnAddEco.onclick=()=>{collectEcoForm();state.pac.ecografias=[...(state.pac.ecografias||[]),{...state.nEco,id:Date.now()}];state.nEco={fecha:hoy(),embarazoId:"",eg:"",crl:"",tn:"",dbp:"",lf:"",ca:"",cc:"",placenta:"",la:"",sexo:"",obs:""};render();};
  const btnAddGin=document.getElementById("btn-add-gin");if(btnAddGin) btnAddGin.onclick=()=>{collectGinForm();if(!state.nGin.motivo.trim()) return;state.pac.consultasGin=[...(state.pac.consultasGin||[]),{...state.nGin,id:Date.now()}];state.nGin={fecha:hoy(),motivo:"",exploracion:"",expComplementarias:"",diagnostico:"",plan:""};render();};
  document.querySelectorAll("[data-del-anal]").forEach(el=>{el.onclick=()=>{state.pac.analisis=state.pac.analisis.filter(x=>x.id!=el.dataset.delAnal);render();};});
  document.querySelectorAll("[data-del-obs]").forEach(el=>{el.onclick=()=>{state.pac.consultasObs=state.pac.consultasObs.filter(x=>x.id!=el.dataset.delObs);render();};});
  document.querySelectorAll("[data-del-eco]").forEach(el=>{el.onclick=()=>{state.pac.ecografias=state.pac.ecografias.filter(x=>x.id!=el.dataset.delEco);render();};});
  document.querySelectorAll("[data-del-gin]").forEach(el=>{el.onclick=()=>{state.pac.consultasGin=state.pac.consultasGin.filter(x=>x.id!=el.dataset.delGin);render();};});
}

function collectFormData(){
  const g=id=>document.getElementById(id)?.value;
  if(state.tab===0){["nombre","aseguradora","fechaNac","telefono","ocupacion","direccion"].forEach(k=>{const v=g("f-"+k);if(v!==undefined)state.pac[k]=v;});}
  if(state.tab===1){["g","p","a","c","v","grupoABO","rh","menarquia","ciclo","fur","antPatologicos","antQuirurgicos","antFamiliares","planificacion"].forEach(k=>{const v=g("f-"+k);if(v!==undefined)state.pac[k]=v;});collectEmbarazos();}
  if(state.tab===2){["fecha","tipo","resultado"].forEach(k=>{const v=g("na-"+k);if(v!==undefined)state.nAnal[k]=v;});}
  if(state.tab===3) collectObsForm();
  if(state.tab===4) collectEcoForm();
  if(state.tab===5) collectGinForm();
}
function collectEmbarazos(){
  const numEmb=parseInt(state.pac.g||0)-1;if(numEmb<=0){state.pac.embarazosPrevios=[];return;}
  const embs=state.pac.embarazosPrevios||[];
  while(embs.length<numEmb) embs.push(emptyEmbarazo(embs.length+1));
  for(let i=0;i<numEmb;i++){
    const get=cls=>document.querySelector(`.${cls}[data-i="${i}"]`)?.value;
    if(embs[i]){embs[i].fecha=get("emb-fecha")??embs[i].fecha;embs[i].evolucion=get("emb-evolucion")??embs[i].evolucion;embs[i].finalizacion=get("emb-finalizacion")??embs[i].finalizacion;embs[i].rnSexo=get("emb-rnSexo")??embs[i].rnSexo;embs[i].rnPeso=get("emb-rnPeso")??embs[i].rnPeso;embs[i].estadoActual=get("emb-estadoActual")??embs[i].estadoActual;}
  }
  state.pac.embarazosPrevios=embs.slice(0,numEmb);
}
function collectObsForm(){const g=id=>document.getElementById(id)?.value;["fecha","embarazoId","motivo","peso","ta","fc","au","presentacion","exploracion","diagnostico","plan"].forEach(k=>{const v=g("no-"+k);if(v!==undefined)state.nObs[k]=v;});}
function collectEcoForm(){const g=id=>document.getElementById(id)?.value;["fecha","embarazoId","eg","crl","tn","dbp","lf","ca","cc","placenta","la","sexo","obs"].forEach(k=>{const v=g("ne-"+k);if(v!==undefined)state.nEco[k]=v;});}
function collectGinForm(){const g=id=>document.getElementById(id)?.value;["fecha","motivo","exploracion","expComplementarias","diagnostico","plan"].forEach(k=>{const v=g("ng-"+k);if(v!==undefined)state.nGin[k]=v;});}

window.updateEGConsulta=function(){
  const fechaConsulta=document.getElementById("no-fecha")?.value;
  const fur=state.pac?.fur;
  const egInput=document.getElementById("no-eg");
  if(egInput&&fur&&fechaConsulta) egInput.value=calcEGEnFecha(fur,fechaConsulta)||"";
};

if(state.loggedIn) loadPacs(); else render();
</script>
